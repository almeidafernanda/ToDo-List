<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-list">
        <h1>To-Do List</h1>
        <form class="input-area">
            <input type="text" id="task-input" placeholder="Adicione uma nova tarefa...">
            <button type="submit" id="add-task-btn"><i class="fa-solid fa-plus" style="color: rgb(222, 117, 11);"></i></button>
        </form>
        <div class="todo-container">
            <ul id="task-list"></ul>
            <img class="icon-list" src="Images/icon-list.png" alt="icon-list">
        </div>
        </div>
    </div>
    
</body>
<script src="script.js"></script>
</html>
